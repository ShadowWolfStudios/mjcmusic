<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice | MJCMusic</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="site-header admin-header">
    <div class="container header-inner">
      <a href="index.html" class="brand"><img src="img/logo2.png" alt="MJC Music" class="logo-image"></a>
      <div class="admin-badge">Invoice</div>
    </div>
  </header>

  <main>
    <section class="section-primary admin-panel">
      <div class="container">
        <div class="admin-card" id="invoice-container">
          <h2>Loading invoice…</h2>
          <p>If this invoice link is valid, the details will appear here.</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer admin-footer">
    <div class="container footer-inner">
      <img src="img/logo.png" alt="MJC Music" class="footer-logo">
      <p>MJC Music © 2026. Invoice views are private and link-based.</p>
    </div>
  </footer>

  <script src="js/invoice-view.js" defer></script>
</body>
</html>
